<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>AP127 Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  html, body, #root { margin:0; padding:0; height:100%; }
  body { font-family:'Inter',system-ui,-apple-system,sans-serif; -webkit-font-smoothing:antialiased; }
  *::-webkit-scrollbar { width:8px; height:8px; }
  *::-webkit-scrollbar-track { background:transparent; }
  *::-webkit-scrollbar-thumb { background:color-mix(in oklch,var(--ink,#888) 18%,transparent); border-radius:999px; border:2px solid transparent; background-clip:padding-box; }
  *::-webkit-scrollbar-thumb:hover { background:color-mix(in oklch,var(--ink,#888) 36%,transparent); background-clip:padding-box; }
  button { font-family:inherit; }
  select { appearance:none; -webkit-appearance:none; background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 8'><path fill='%23888' d='M1 1l5 5 5-5'/></svg>"); background-repeat:no-repeat; background-position:right 6px center; background-size:10px; padding-right:22px; }
  #root { display:flex; flex-direction:column; }
</style>
</head>
<body data-theme="cockpit">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Pre-generated data — run scripts/generate_flight_data.py to refresh -->
<script src="flight-data.js"></script>

<!-- Shared components and context -->
<script type="text/babel" src="js/app-shared.js"></script>

<!-- Views -->
<script type="text/babel" src="js/view-board.js"></script>
<script type="text/babel" src="js/view-gantt.js"></script>
<script type="text/babel" src="js/view-mobile.js"></script>
<script type="text/babel" src="js/view-weekly.js"></script>
<script type="text/babel" src="js/view-summary.js"></script>

<script type="text/babel" data-presets="env,react">
const VIEWS = [
  { id:'board',   label:'A · BOARD'    },
  { id:'gantt',   label:'B · GANTT'    },
  { id:'weekly',  label:'C · WEEKLY'   },
  { id:'summary', label:'D · ANALYTICS'},
  { id:'mobile',  label:'E · MOBILE'   },
];

function NavBar({ view, setView }) {
  return (
    <div style={{
      height:36, padding:'0 16px', background:'var(--bg-2)',
      borderBottom:'1px solid var(--line)', display:'flex',
      alignItems:'center', gap:5, flexShrink:0,
    }}>
      {/* Wordmark */}
      <div style={{ display:'flex', alignItems:'center', gap:7, marginRight:10 }}>
        <span style={{ width:7,height:7,borderRadius:999,background:'var(--col-done)',boxShadow:'0 0 6px var(--col-done)',animation:'pulse 2s ease-in-out infinite' }}/>
        <span className="mono uc" style={{ fontSize:11, fontWeight:700, letterSpacing:'0.08em' }}>AP127 CMD</span>
      </div>
      {/* View tabs */}
      {VIEWS.map(v => (
        <button key={v.id} onClick={() => setView(v.id)} className="mono uc" style={{
          padding:'3px 11px', fontSize:10, borderRadius:3, cursor:'pointer',
          border:`1px solid ${view===v.id?'var(--col-pending)':'var(--line)'}`,
          background:view===v.id?'color-mix(in oklch,var(--col-pending) 14%,var(--surface))':'transparent',
          color:view===v.id?'var(--col-pending)':'var(--ink-3)',
          fontWeight:view===v.id?600:400, transition:'all .1s',
        }}>{v.label}</button>
      ))}
      <div style={{flex:1}}/>
      <div className="mono uc" style={{ fontSize:9, color:'var(--ink-3)' }}>
        {window.FLIGHT_DATA.tz} · {window.FLIGHT_DATA.fetchedAt.slice(0,10)}
      </div>
    </div>
  );
}

function MobileFrame({ children }) {
  return (
    <div style={{
      flex:1, minHeight:0, overflowY:'auto', overflowX:'hidden',
      display:'flex', justifyContent:'center', alignItems:'flex-start',
      padding:'24px 0', background:'var(--bg)',
    }}>
      <div style={{
        width:390, height:844, flexShrink:0, position:'relative',
        boxShadow:'0 0 0 1px var(--line), 0 20px 60px oklch(0 0 0 / 0.4)',
        borderRadius:12, overflow:'hidden',
      }}>
        {children}
      </div>
    </div>
  );
}

function App() {
  const [view, setView]   = React.useState('board');
  const [tweaks, setTweakState] = React.useState({
    theme:'cockpit', showSim:false, showStandby:true, groupBy:'batch',
  });

  const setTweak = React.useCallback((k, v) => {
    setTweakState(t => ({ ...t, [k]: typeof v === 'function' ? v(t[k]) : v }));
  }, []);

  React.useEffect(() => { document.body.dataset.theme = tweaks.theme; }, [tweaks.theme]);

  return (
    <AppProvider tweaks={tweaks} setTweak={setTweak}>
      <ThemeStyle/>
      <NavBar view={view} setView={setView}/>
      {/* View content */}
      <div style={{ flex:1, minHeight:0, overflow:'hidden', position:'relative' }}>
        {view==='board'   && <OpsBoard/>}
        {view==='gantt'   && <GanttBoard/>}
        {view==='weekly'  && <WeeklyBoard/>}
        {view==='summary' && <SummaryBoard/>}
        {view==='mobile'  && <MobileFrame><MobileBoard/></MobileFrame>}
      </div>
    </AppProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<style>@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}</style>
</body>
</html>
